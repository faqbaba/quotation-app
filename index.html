<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ-SATROM QUOTATION</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <div class="company-header">
    <img src="logo.png" alt="Company Logo">

    <h1>FAQ-SATROM ENTERPRISES LTD</h1>

    <p>RC: 7977114</p>

    <p>
        Electrical Services |
        Real Estate |
        Building Management
    </p>
</div>

<div class="quote-details">

    <p>
        <strong>Quotation No:</strong>
        <span id="quoteNo"></span>
    </p>

    <p>
        <strong>Date:</strong>
        <span id="today"></span>
    </p>

</div>

<div id="clientDisplay"></div>
<input type="text"
id="clientName"
placeholder="Client Name">

<input type="text"
id="projectName"
placeholder="Project Name">

<input type="text"
id="location"
placeholder="Project Location">

<hr>

<h2>Add Items</h2>

<input type="text"
id="itemName"
placeholder="Item Name">

<input type="number"
id="quantity"
placeholder="Quantity">

<input type="number"
id="price"
placeholder="Unit Price">

<button onclick="addItem()">
Add Item
</button>

<table id="quotationTable">

<tr>
    <th>Item</th>
    <th>Qty</th>
    <th>Unit Price</th>
    <th>Amount</th>
</tr>

</table>

<h2 id="total">
Total: ₦0
</h2>

<button onclick="window.print()">
Print Quotation
</button>
<script src="script.js"></script>
<div class="footer-info">

    <hr>

    <p>
        FAQ-SATROM ENTERPRISES LTD
    </p>

    <p>
        Phone: 0703 941 6582
    </p>

    <p>
        Email: satrom.enterprises@gmail.com
    </p>

</div>
</body>
